<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daniel Kai</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/animation.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@100;200;300;400;500;600;700;800;900&family=Taviraj:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- start main-1 -->
    <article class="bgc-wrapper-1">
      <main class="projects">
        <!-- start navbar -->
        <nav class="projects__nav">
          <ul>
            <li>
              <div></div>
              <div></div>
              <div></div>
            </li>
            <li><a href="">Daniel Kai</a></li>
            <li>
              <a href="">About</a>
              <a href="">Projects</a>
            </li>
          </ul>
        </nav>
        <!-- end navbar -->

        <!-- start header -->
        <header class="projects__header">
          <figure class="projects__header__title">
            <img src="./white/title.png" alt="" />
          </figure>
        </header>
        <hr class="hr" />
        <!-- end header -->

        <!-- start article 1 -->
        <article class="projects__section">
          <figure class="projects__section__num">
            <img src="./white/01.png" alt="" />
          </figure>
          <ul class="projects__section__content">
            <li class="imgBox">
              <img src="./white/shoe-img.jpg" alt="" />
            </li>
            <li class="title">
              <img src="./white/shoe.png" alt="" />
            </li>
          </ul>
        </article>
        <hr class="hr" />
        <!-- end article 1 -->

        <!-- start article 2 -->
        <article class="projects__section">
          <figure class="projects__section__num">
            <img src="./white/02.png" alt="" />
          </figure>
          <ul class="projects__section__content">
            <li class="imgBox">
              <img src="./white/pet-img.jpg" alt="" />
            </li>
            <li class="title">
              <img src="./white/pet.png" alt="" />
            </li>
          </ul>
        </article>
        <hr class="hr" />
        <!-- end article 2 -->

        <!-- start article 3 -->
        <article class="projects__section">
          <figure class="projects__section__num">
            <img src="./white/03.png" alt="" />
          </figure>
          <ul class="projects__section__content">
            <li class="imgBox">
              <img src="./white/dessert-img.jpg" alt="" />
            </li>
            <li class="title">
              <img src="./white/dessert.png" alt="" />
            </li>
          </ul>
        </article>
        <hr class="hr" />

        <!-- end article 3 -->

        <!-- start footer -->
        <footer class="projects__footer">
          <ul>
            <li><a href="">Daniel Kai</a></li>
            <li><a href="">BACK TO TOP</a></li>
            <li>
              <a href="">About</a>
              <a href="">Github</a>
            </li>
          </ul>
        </footer>
        <!-- end footer -->
      </main>
    </article>
    <!-- end main-1 -->

    <!-- start main-2 -->
    <article class="bgc-wrapper-2">
      <main class="about">
        <!-- start navbar -->
        <nav class="about__nav">
          <ul>
            <li>
              <div></div>
              <div></div>
              <div></div>
            </li>
            <li><a href="">Daniel Kai</a></li>
            <li>
              <a href="">About</a>
              <a href="">Projects</a>
            </li>
          </ul>
        </nav>
        <!-- end navbar -->

        <!-- start header -->
        <header class="about__header">
          <figure class="about__header__title">
            <img src="./black/title_5.png" alt="" />
          </figure>
          <section class="about__header__content">
            <figure class="textBox">
              <img src="./black/intro.png" alt="" />
            </figure>
            <figure class="imgBox">
              <img src="./black/github.png" alt="" />
            </figure>
          </section>
        </header>
        <hr class="hr" />
        <!-- end header -->

        <!-- start article 1 -->
        <article class="about__section--1">
          <p class="title">SKILL</p>
          <figure class="content">
            <img src="./black/list.png" alt="" />
          </figure>
        </article>
        <hr class="hr" />
        <!-- end article 1 -->

        <!-- start article 2 -->
        <article class="about__section--2">
          <p class="title">EXPERIENCE</p>
          <figure class="content">
            <img src="./black/3.png" alt="" />
          </figure>
        </article>
        <hr class="hr" />
        <!-- end article 2 -->

        <!-- start footer -->
        <footer class="about__footer">
          <ul>
            <li><a href="">Daniel Kai</a></li>

              <a href="">About</a>

        <!-- end footer -->
